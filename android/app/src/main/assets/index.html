<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нейро-ассистент</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { color: #8b949e; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
    label { font-size: 13px; color: #8b949e; display: block; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      font-size: 15px;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus { border-color: #1f6feb; }
    button {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      background: #1f6feb;
      color: #fff;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
    .hint {
      margin-top: 16px;
      padding: 12px;
      background: #21262d;
      border-radius: 10px;
      font-size: 12px;
      color: #8b949e;
      line-height: 1.7;
    }
    .hint code {
      background: #30363d;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
      color: #79c0ff;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🤖 Нейро-ассистент</h1>
  <p>Введи адрес сервера для подключения</p>

  <label>URL сервера</label>
  <input id="url" type="url" placeholder="http://192.168.1.100:8000" autocomplete="off" />

  <button onclick="connect()">Подключиться</button>

  <div class="hint">
    <b>Как запустить сервер:</b><br>
    1. Установи Python зависимости<br>
    2. Запусти: <code>python main.py</code><br>
    3. Открой на ПК: <code>http://localhost:8000</code><br>
    4. Для Android укажи IP твоего ПК
  </div>
</div>

<script>
  // Restore saved URL
  const saved = localStorage.getItem('na_server_url');
  if (saved) document.getElementById('url').value = saved;

  function connect() {
    const url = document.getElementById('url').value.trim().replace(/\/$/, '');
    if (!url) return alert('Введи URL сервера');
    localStorage.setItem('na_server_url', url);
    window.location.href = url;
  }

  document.getElementById('url').addEventListener('keydown', e => {
    if (e.key === 'Enter') connect();
  });
</script>
</body>
</html>
